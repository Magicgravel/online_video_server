<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Server</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      margin: 24px;
      background: #f7f7f8;
      color: #222;
    }
    h1 {
      margin-bottom: 12px;
    }
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
    }
    .list {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      height: calc(100vh - 120px);
      overflow: auto;
    }
    .list a {
      display: block;
      padding: 6px 8px;
      text-decoration: none;
      color: #1a1a1a;
      border-radius: 6px;
    }
    .list a:hover {
      background: #f0f0f2;
    }
    .player {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      min-height: 320px;
    }
    video {
      width: 100%;
      max-height: 70vh;
      background: #000;
      border-radius: 6px;
    }
    .empty {
      color: #666;
      padding: 8px;
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .list {
        height: auto;
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <h1>Video Server</h1>
  <div class="layout">
    <div class="list">
      {% if videos %}
        {% for video in videos %}
          <a href="/videos/{{ video | urlencode }}" data-video="{{ video | urlencode }}">{{ video }}</a>
        {% endfor %}
      {% else %}
        <div class="empty">未发现视频文件。</div>
      {% endif %}
    </div>
    <div class="player">
      <video id="player" controls preload="metadata"></video>
    </div>
  </div>

  <script>
    const player = document.getElementById("player");
    document.querySelectorAll(".list a").forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        player.src = link.getAttribute("data-video");
        player.play();
      });
    });
  </script>
</body>
</html>
